<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flapjack API Documentation</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.11.0/swagger-ui.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .swagger-ui .topbar {
      display: none;
    }
    .docs-shell-notice {
      box-sizing: border-box;
      width: 100%;
      padding: 12px 20px;
      font-family: sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #fef3c7;
      border-bottom: 1px solid #f59e0b;
    }
  </style>
</head>
<body>
  <div class="docs-shell-notice">
    OpenAPI definition is not bundled in this demo yet. Swagger UI will load the generated definition when <code>/openapi.json</code> is added by a later build stage.
  </div>
  <div id="swagger-ui"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.11.0/swagger-ui-bundle.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.min.js"></script>
  <script>
    window.onload = function() {
      window.ui = SwaggerUIBundle({
        url: "/openapi.json",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout"
      });
    };
  </script>
</body>
</html>
